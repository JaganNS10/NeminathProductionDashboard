<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Employee</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #FF6B6B, #FFD93D);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: #fff;
      padding: 50px 40px;
      border-radius: 20px;
      width: 400px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      animation: pop 0.4s ease-out;
    }

    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #FF6B6B;
      margin-bottom: 20px;
    }

    p {
      font-size: 16px;
      color: #555;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    .btn {
      flex: 1;
      padding: 15px 0;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: 0.3s;
      text-decoration: none;
      text-align: center;
      display: inline-block;
    }

    .btn-yes {
      background: #FF6B6B;
      color: #fff;
      padding: 20px 60px;
      box-shadow: 0 5px 15px rgba(255,107,107,0.4);
    }

    .btn-yes:hover {
      background: #FF3B3B;
      transform: translateY(-2px);
    }

    .btn-no {
        background: #f5f5f5;
        color: #555;
        border: 1px solid #ddd;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        flex: 1;
        transition: 0.3s;
        text-align: center;
        display: inline-block;
    }

    .btn-no:hover {
        background: #eee;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚠️ Are you sure?</h1>
    <p>Do you really want to delete this employee? This action <strong>cannot be undone</strong>.</p>
    
    <div class="buttons">
        <form action="{% url 'leads_delete' get.id %}" method="post" style="flex: 1;">
            {% csrf_token %}
            <button class="btn btn-yes" type="submit">Yes</button>
        </form>

        <a href="{% url 'leads' %}" class="btn btn-no">No</a>
    </div>
  </div>
</body>
</html>
