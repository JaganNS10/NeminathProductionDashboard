<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 400px;
            max-width: 90%;
            text-align: center;
            animation: slideIn 1s ease forwards;
        }

        @keyframes slideIn {
            0% { transform: translateY(-50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            color: #fff;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 15px 20px;
            margin: 15px 0;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            background: rgba(255, 255, 255, 0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border-radius: 50px;
            border: none;
            background: #ff7eb3;
            background: linear-gradient(45deg, #ff7eb3, #ff758c);
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .messages {
            margin-bottom: 20px;
            text-align: left;
            color: #ffdd57;
            font-weight: bold;
            font-size: 0.95rem;
        }

        @media (max-width: 500px) {
            .login-container { padding: 40px 20px; }
            h1 { font-size: 2rem; }
        }
        .login-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #ff7eb3, #ff758c, #667eea);
            background-clip: text; /* not supported in Firefox fully */
            color: transparent;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 5s linear infinite;
        }

        .login-header h1 span {
            font-weight: 900; /* highlight company name */
            font-size: 2.2rem;
        }

        .login-header .tagline {
            font-size: 1rem;
            margin-top: 10px;
            color: #ffeebb;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* Animate gradient text */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Welcome to <span>Neminath Wood Industry Pvt Ltd</span></h1>
            <p class="tagline">Employee Login Portal</p>
        </div>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
